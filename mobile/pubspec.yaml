name: form_fitting_prints
description: A Flutter application for scanning and fitting wearable 3D-printed objects.

version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera support
  camera: ^0.10.5+5
  
  # HTTP client
  http: ^1.1.0
  
  # State management
  provider: ^6.0.0
  
  # File handling
  path_provider: ^2.1.0
  
  # UUID generation
  uuid: ^4.0.0
  
  # UI improvements
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
